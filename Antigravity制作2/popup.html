<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Media Search</title>
  <style>
    /* Critical inline styles to guarantee visibility */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 600px;
      min-height: 600px;
      max-height: 600px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #1e1e2e;
      color: #f0f0f8;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 16px 20px 12px;
      background: linear-gradient(135deg, #2a2a3e 0%, #1e1e2e 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      position: relative;
    }

    #closeBtn {
      position: absolute;
      top: 8px;
      right: 10px;
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #8888a8;
      transition: color 0.2s ease;
      line-height: 1;
    }

    #closeBtn:hover {
      color: #f0f0f8;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 20px;
      height: 20px;
      color: #7c5cfc;
    }

    .logo-text {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #7c5cfc 0%, #c084fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .settings-gear {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #8888a8;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .settings-gear svg {
      width: 16px;
      height: 16px;
    }

    .settings-gear:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #7c5cfc;
    }

    .subtitle {
      margin-top: 2px;
      font-size: 11px;
      color: #8888a8;
      letter-spacing: 0.5px;
    }

    .search-bar {
      padding: 12px 20px;
      display: flex;
      gap: 8px;
      background: #1e1e2e;
    }

    .search-input-wrap {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      width: 16px;
      height: 16px;
      color: #8888a8;
      pointer-events: none;
    }

    #searchInput {
      width: 100%;
      padding: 10px 14px 10px 38px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: #f0f0f8;
      font-family: inherit;
      font-size: 13px;
      outline: none;
    }

    #searchInput::placeholder {
      color: #8888a8;
    }

    #searchInput:focus {
      border-color: #7c5cfc;
      box-shadow: 0 0 0 3px rgba(124, 92, 252, 0.3);
    }

    .search-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #7c5cfc 0%, #9078ff 100%);
      color: white;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      min-width: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .search-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(124, 92, 252, 0.3);
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .tabs {
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 4px;
      background: #1e1e2e;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .tabs-left {
      display: flex;
      gap: 4px;
      flex: 1;
    }

    .tab {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 16px;
      border: none;
      background: none;
      color: #8888a8;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }

    .tab svg {
      width: 15px;
      height: 15px;
    }

    .tab:hover {
      color: #b8b8d0;
    }

    .tab.active {
      color: #7c5cfc;
      border-bottom-color: #7c5cfc;
    }

    .full-search-btn {
      border: 1px solid rgba(124, 92, 252, 0.25);
      border-radius: 6px;
      background: rgba(124, 92, 252, 0.08);
      color: #7c5cfc;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      transition: all 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .full-search-btn svg {
      width: 12px;
      height: 12px;
    }

    .full-search-btn:hover {
      background: rgba(124, 92, 252, 0.15);
      border-color: rgba(124, 92, 252, 0.5);
    }

    /* Filter Bar */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: #1e1e2e;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .filter-label {
      font-size: 10px;
      color: #8888a8;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .filter-select {
      padding: 4px 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      color: #f0f0f8;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s ease;
      -webkit-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238888a8' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 6px center;
      padding-right: 22px;
    }

    .filter-select:focus {
      border-color: #7c5cfc;
    }

    .filter-select option {
      background: #2a2a3e;
      color: #f0f0f8;
    }

    .refresh-btn {
      margin-left: auto;
      padding: 4px 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      color: #b8b8d0;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s ease;
    }

    .refresh-btn svg {
      width: 12px;
      height: 12px;
    }

    .refresh-btn:hover:not(:disabled) {
      border-color: rgba(255, 255, 255, 0.25);
      color: #f0f0f8;
    }

    .refresh-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Pagination */
    .pagination-bar {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 8px 20px;
      background: #1e1e2e;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .page-btn {
      padding: 5px 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.06);
      color: #b8b8d0;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s ease;
    }

    .page-btn svg {
      width: 12px;
      height: 12px;
    }

    .page-btn:hover:not(:disabled) {
      border-color: #7c5cfc;
      color: #7c5cfc;
    }

    .page-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .page-info {
      font-size: 12px;
      color: #b8b8d0;
      font-weight: 500;
      min-width: 60px;
      text-align: center;
    }

    .results-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
    }

    .results-container::-webkit-scrollbar {
      width: 6px;
    }

    .results-container::-webkit-scrollbar-track {
      background: transparent;
    }

    .results-container::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 3px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      text-align: center;
    }

    .empty-icon {
      width: 48px;
      height: 48px;
      color: #8888a8;
      opacity: 0.5;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 14px;
      color: #b8b8d0;
      margin-bottom: 4px;
    }

    .empty-state span {
      font-size: 11px;
      color: #8888a8;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card {
      background: #2e2e48;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.2s ease;
      animation: cardIn 0.4s ease backwards;
    }

    .card:hover {
      border-color: rgba(255, 255, 255, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .card-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      overflow: hidden;
      background: #2a2a3e;
      cursor: pointer;
    }

    .card-thumb img,
    .card-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .card:hover .card-thumb img,
    .card:hover .card-thumb video {
      transform: scale(1.05);
    }

    .card-source-badge {
      position: absolute;
      top: 6px;
      left: 6px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .badge-pexels {
      background: rgba(5, 160, 129, 0.85);
      color: white;
    }

    .badge-pixabay {
      background: rgba(245, 166, 35, 0.85);
      color: white;
    }

    .card-preview-icon {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.4);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .card-thumb:hover .card-preview-icon {
      opacity: 1;
    }

    .card-preview-icon svg {
      width: 28px;
      height: 28px;
      color: white;
    }

    .card-info {
      padding: 10px;
    }

    .card-title {
      font-size: 12px;
      font-weight: 500;
      color: #f0f0f8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .card-author {
      font-size: 11px;
      color: #8888a8;
      margin-bottom: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-actions {
      display: flex;
      gap: 6px;
    }

    .card-btn {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: #b8b8d0;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .card-btn svg {
      width: 12px;
      height: 12px;
    }

    .card-btn:hover {
      border-color: rgba(255, 255, 255, 0.25);
      background: #3a3a55;
      color: #f0f0f8;
    }

    .card-btn.btn-download {
      border-color: rgba(124, 92, 252, 0.3);
      color: #7c5cfc;
    }

    .card-btn.btn-download:hover {
      background: rgba(124, 92, 252, 0.1);
      border-color: #7c5cfc;
    }

    .card-btn.btn-download.downloading {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status-bar {
      padding: 8px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      background: #2a2a3e;
      font-size: 11px;
      color: #8888a8;
      text-align: center;
      flex-shrink: 0;
    }

    .status-bar.error {
      color: #f87171;
    }

    .status-bar.success {
      color: #34d399;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-content {
      position: relative;
      max-width: 95%;
      max-height: 90%;
      border-radius: 16px;
      overflow: hidden;
      background: #2e2e48;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .modal-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .modal-close:hover {
      background: rgba(0, 0, 0, 0.8);
    }

    .modal-body img {
      display: block;
      max-width: 460px;
      max-height: 500px;
      object-fit: contain;
    }

    .modal-body video {
      display: block;
      max-width: 460px;
      max-height: 500px;
    }
  </style>
</head>

<body>
  <!-- Header -->
  <header class="header">
    <div class="header-row">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <h1 class="logo-text">Free Media Search</h1>
      </div>
      <button class="settings-gear" id="settingsBtn" title="API Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z">
          </path>
        </svg>
      </button>
      <button id="closeBtn" title="Close">✕</button>
    </div>
    <p class="subtitle">Pexels + Pixabay</p>
  </header>

  <!-- Search Bar -->
  <div class="search-bar">
    <div class="search-input-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" id="searchInput" placeholder="Search free images & videos..." autocomplete="off">
    </div>
    <button id="searchBtn" class="search-btn">
      <span class="btn-text">Search</span>
      <div class="btn-loader" style="display:none">
        <div class="spinner"></div>
      </div>
    </button>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tabs-left">
      <button class="tab active" data-type="images" id="tabImages">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
        Images
      </button>
      <button class="tab" data-type="videos" id="tabVideos">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <polygon points="23 7 16 12 23 17 23 7"></polygon>
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
        </svg>
        Videos
      </button>
    </div>
    <button class="full-search-btn" id="fullSearchBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="15 3 21 3 21 9"></polyline>
        <line x1="21" y1="3" x2="14" y2="10"></line>
      </svg>
      大きい画面で開く
    </button>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar">
    <div class="filter-group">
      <span class="filter-label">Orientation</span>
      <select id="orientationSelect" class="filter-select">
        <option value="all">All</option>
        <option value="landscape">Landscape</option>
        <option value="portrait">Portrait</option>
        <option value="square">Square</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">Source</span>
      <select id="sourceSelect" class="filter-select">
        <option value="all">All</option>
        <option value="pexels">Pexels</option>
        <option value="pixabay">Pixabay</option>
      </select>
    </div>
    <button class="refresh-btn" id="refreshBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="23 4 23 10 17 10"></polyline>
        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
      </svg>
      Refresh
    </button>
  </div>

  <!-- Results -->
  <div class="results-container" id="resultsContainer">
    <div class="empty-state" id="emptyState">
      <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <p>Search for free images and videos</p>
      <span>Powered by Pexels &amp; Pixabay</span>
    </div>
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar">
    <span id="statusText">Ready</span>
  </div>

  <!-- Pagination -->
  <div class="pagination-bar" id="paginationBar">
    <button class="page-btn" id="prevBtn" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>
      Prev
    </button>
    <span class="page-info" id="pageInfo">Page 1</span>
    <button class="page-btn" id="nextBtn">
      Next
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
        stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    </button>
  </div>

  <!-- Preview Modal -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal-content" id="modalContent">
      <button class="modal-close" id="modalClose">&times;</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
